<script>
  // Select all nav links
  const navLinks = document.querySelectorAll('header nav a');

  // Get current page filename
  let currentPage = window.location.pathname.split('/').pop();
  if (!currentPage) currentPage = 'index.html'; // default for homepage

  navLinks.forEach(link => {
    let href = link.getAttribute('href');

    // Map your special cases: e.g., The Vision page
    if (href === '#') href = 'join.html'; // update this to match your actual page

    // Compare
    if (href === currentPage) {
      link.classList.add('bg-gray-500', 'text-white'); // highlight active tab
    } else {
      link.classList.remove('bg-gray-500', 'text-white'); // remove highlight if needed
    }
  });
</script>

<script>
  const menuBtn = document.getElementById('menu-btn');
  const menu = document.getElementById('menu');
  const navLinkss = document.querySelectorAll('#menu a');

  // Toggle menu when hamburger is clicked
  menuBtn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
  });

  // Hide menu when a link is clicked (mobile UX)
  navLinkss.forEach(link => {
    link.addEventListener('click', () => {
      menu.classList.add('hidden');
    });
  });
</script>

<script>
const form = document.getElementById("registrationForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  const data = Object.fromEntries(formData.entries());

  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbzmeufb93PVKFHCgiV8g3zYUL2bPLJkAhfPATIOp71pY2BgiNSXhAjJlp2y7IAU9ZHuNQ/exec", {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (result.status === "duplicate") {
      alert("You have already registered!");
    } else {
      alert("Registration successful!");
      form.reset();
    }

  } catch (error) {
    alert("Error submitting form. Try again.");
  }
});
</script>
