      <!-- Address -->

      <!-- Area of Interest (Radio - single select) -->

<script>
  // Select all nav links
  const navLinks = document.querySelectorAll('header nav a');

  // Get current page filename
  let currentPage = window.location.pathname.split('/').pop();
  if (!currentPage) currentPage = 'index.html'; // default for homepage

  navLinks.forEach(link => {
    let href = link.getAttribute('href');

    // Map your special cases: e.g., The Vision page
    if (href === '#') href = 'join.html'; // update this to match your actual page

    // Compare
    if (href === currentPage) {
      link.classList.add('bg-gray-500', 'text-white'); // highlight active tab
    } else {
      link.classList.remove('bg-gray-500', 'text-white'); // remove highlight if needed
    }
  });
</script>

<script>
  const menuBtn = document.getElementById('menu-btn');
  const menu = document.getElementById('menu');
  const navLinkss = document.querySelectorAll('#menu a');

  // Toggle menu when hamburger is clicked
  menuBtn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
  });

  // Hide menu when a link is clicked (mobile UX)
  navLinkss.forEach(link => {
    link.addEventListener('click', () => {
      menu.classList.add('hidden');
    });
  });
</script>

<!-- JavaScript for Dynamic Ward Selection -->
<script>
  const wards = {
    "ETINAN": [
      "ETINAN URBAN I","ETINAN URBAN II","ETINAN URBAN III","ETINAN URBAN IV","ETINAN URBAN V",
      "SOUTHERN IMAN I","SOUTHERN IMAN II","SOUTHERN IMAN III","SOUTHERN IMAN IV",
      "NORTHERN IMAN I","NORTHERN IMAN II"
    ],
    "NSIT IBOM": [
      "ASANG I","ASANG II","ASANG III","ASANG IV","ASANG V",
      "MBAISO I","MBAISO II","MBAISO III","MBAISO IV","MBAISO V"
    ],
    "NSIT UBIUM": [
      "IBIAKPAN/OBOTIM II","IBIAKPAN OBOTIM I","ITRETO","NDIYA",
      "UBIUM NORTH I","UBIUM NORTH II","UBIUM NORTH III",
      "UBIUM SOUTH I","UBIUM SOUTH II","UBIUM SOUTH III"
    ]
  };

  function updateWards() {
    const lga = document.getElementById("lga").value;
    const wardSelect = document.getElementById("ward");

    wardSelect.innerHTML = "<option>Select Ward</option>";

    if (wards[lga]) {
      wards[lga].forEach(ward => {
        const option = document.createElement("option");
        option.value = ward;
        option.textContent = ward;
        wardSelect.appendChild(option);
      });
    }
  }
</script>
